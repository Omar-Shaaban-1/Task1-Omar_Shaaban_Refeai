# controllers.yaml
# -----------------
# ros2_control controller manager configuration.
#
# The PID gains below are STARTING POINTS ONLY. Per the "Dynamic
# Tuning Failure Modes" slide:
#   - Gains too LOW -> joint sags under gravity, can't track the
#     target trajectory (path tolerance violation).
#   - Gains too HIGH -> controller overcorrects tiny errors,
#     causing oscillation/shaking (acceleration limit exceeded).
#
# Tune iteratively: increase P until you see the first sign of
# oscillation, then back off ~20%, then add D to damp overshoot.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 1.0
      joint_1: { trajectory: 0.05, goal: 0.02 }
      joint_2: { trajectory: 0.05, goal: 0.02 }
      joint_3: { trajectory: 0.05, goal: 0.02 }
      joint_4: { trajectory: 0.05, goal: 0.02 }
      joint_5: { trajectory: 0.05, goal: 0.02 }
      joint_6: { trajectory: 0.05, goal: 0.02 }

    gains:
      joint_1: { p: 100.0, i: 1.0, d: 10.0, i_clamp: 5.0 }
      joint_2: { p: 150.0, i: 1.0, d: 15.0, i_clamp: 5.0 }
      joint_3: { p: 120.0, i: 1.0, d: 12.0, i_clamp: 5.0 }
      joint_4: { p: 50.0,  i: 0.5, d: 5.0,  i_clamp: 2.0 }
      joint_5: { p: 40.0,  i: 0.5, d: 4.0,  i_clamp: 2.0 }
      joint_6: { p: 20.0,  i: 0.2, d: 2.0,  i_clamp: 1.0 }
